name: hunt-worker

on:
  workflow_dispatch:
    inputs:
      brain_url:
        description: "Brain URL"
        required: false
        default: ""
        type: string
      workers:
        description: "Asyncio workers per process"
        required: false
        default: "600"
        type: string
      budget:
        description: "IPs per job batch"
        required: false
        default: "300000"
        type: string
  schedule:
    - cron: "0 */5 * * *"

jobs:
  worker:
    name: hunt-worker-${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 340
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scanner
        env:
          BRAIN_URL: ${{ inputs.brain_url || vars.BRAIN_URL }}
          WORKERS:   ${{ inputs.workers || '600' }}
          BUDGET:    ${{ inputs.budget || '300000' }}
          WORKER_ID: "gh-${{ github.run_id }}-s${{ matrix.shard }}"
        run: |
          echo "Brain: $BRAIN_URL  Workers: $WORKERS  Budget: $BUDGET"
          python3 hunt_v4.py \
            --brain   "$BRAIN_URL" \
            --workers "$WORKERS" \
            --budget  "$BUDGET"
